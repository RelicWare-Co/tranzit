commands:
  install: bun install
  build: bun run build
  dev: bun run dev
  dev:server: bun run dev:server
  lint: bun run lint
  format: bun run format
  check: bun run check
  test: bun run test

services:
  web:
    start: cd packages/web && bun run dev
    stop: lsof -ti :3000 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3000
    port: 3000
    depends_on: []

  api:
    start: bun run dev:server
    stop: lsof -ti :3001 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3001
    port: 3001
    depends_on: []
